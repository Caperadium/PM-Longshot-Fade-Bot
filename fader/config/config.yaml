mode: paper  # paper | live

strategy:
  band_low: 0.5
  band_high: 0.95
  min_dte: 3
  max_dte: 6
  min_time_in_band_s: 600
  order_notional_usd: 10.0
  alpha: -0.20  # tilt ∈ [-1, +1]; 0=uniform, -1=low-price, +1=high-price

filters:
  min_24h_volume: 1000.0
  min_total_volume: 1000.0
  min_book_depth: 0.0  # USD notional at NO touch; 0 = filter off

feed:
  decision_interval_s: 1.0
  max_staleness_seconds: 30
  gap_halt_seconds: 60
  ws_url: "wss://ws-subscriptions-clob.polymarket.com/ws/market"
  ws_force_reconnect_s: 90   # force WS reconnect if no feed data this long
  ws_ping_interval_s: 10     # app-level PING cadence
  ws_pong_timeout_s: 25      # close socket if no PONG within this (belt-and-suspenders)
  ws_expect_pong: false      # enable pong-timeout close; default off (rely on silence watchdog)
  resync_concurrency: 8      # bounded-concurrent REST /book resync on reconnect (restart to change)
  executor_workers: 16       # sized ThreadPoolExecutor for blocking REST calls (restart to change)

polling:
  bankroll_s: 30
  resolution_s: 60
  discovery_s: 300
  control_poll_s: 1.0
  calibration_fetch_s: 21600  # calibration data fetch (6h); 0 disables

orders:
  spread_market_threshold_c: 1.0  # cents; <= this = market order
  requote_move_c: 0.5             # cents mid-move to trigger cancel-replace
  limit_ttl_s: 300                # 5 min TTL before re-evaluate

risk:
  daily_loss_breaker_pct: 5.0
  max_deployed_pct: 100.0
  per_market_cap_pct: 5.0
  matic_min_balance: 0.0  # MATIC; not required for off-chain CLOB orders

telegram:
  heartbeat_minutes: 180  # 3h between heartbeats
  enabled: true

# Conservative token-bucket rates; orders of magnitude below documented CLOB limits.
# Documented ceilings: writes 5000/10s, /book & /price 1500/10s, general 9000/10s.
ratelimit:
  write_per_s: 10.0
  write_burst: 20
  read_per_s: 5.0
  read_burst: 10

auth:
  mode: eoa  # EOA private key; signature_type 0

bankroll:
  basis: cash  # all risk gating keys off on-chain USDC.e cash only
  paper_bankroll_usdc: 1000.0  # simulated USDC balance in paper mode

# FIGARCH model pricer (vendored V2 engine, see PRICER_README.md).
# veto=false (default) = log-only: model p_yes + NO edge are recorded on every
# entered decision but never reject. Flip veto=true to require
# model_edge_no >= min_edge (edge = (1 - model_p_yes) - no_ask).
pricer:
  enabled: true
  veto: false
  min_edge: 0.0
  reprice_s: 900         # per-expiry ladder cache TTL (s)
  n_sims: 15000          # Monte Carlo paths per ladder
  garch_refit_s: 21600   # GARCH refit + jump-param reload cadence (6h)
  data_max_age_s: 7200   # BTC intraday CSV older than this = no model opinion
  data_refresh_s: 1800   # background BTC data fetch cadence; 0 = external timer owns it
  data_dir: ""           # empty = <repo root>/DATA
